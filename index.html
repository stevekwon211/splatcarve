<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>splatcarve</title>
  </head>
  <body>
    <canvas id="splatcarve-canvas"></canvas>

    <aside id="stats" aria-label="Scene stats">
      <div data-stat="mode">mode pick</div>
      <div data-stat="fps">fps —</div>
      <div data-stat="splats">splats —</div>
      <div data-stat="voxels">voxels —</div>
      <div data-stat="occupancy">occupancy —</div>
      <div data-stat="latency">pick —</div>
      <div data-stat="history">history —</div>
    </aside>

    <aside id="hints" aria-label="Keyboard hints">
      <div>drag — orbit</div>
      <div>scroll — zoom</div>
      <div><kbd>1</kbd> / <kbd>2</kbd> / <kbd>3</kbd> — pick / carve / stack</div>
      <div><kbd>G</kbd> — toggle voxel grid</div>
      <div><kbd>R</kbd> — reset pick-latency stats</div>
      <div><kbd>⌘Z</kbd> / <kbd>⌘⇧Z</kbd> — undo / redo</div>
      <div>click — pick (logs) / carve (voxel) / stack (commit ghost)</div>
    </aside>

    <aside id="pick-info" aria-label="Picked splat info"></aside>
    <aside id="status-toast" role="status" aria-live="polite" hidden></aside>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
