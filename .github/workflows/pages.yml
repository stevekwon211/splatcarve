name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Per https://docs.github.com/en/pages/getting-started-with-github-pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; cancel pending runs in favour of the latest commit.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build dist/ for Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (Pages subpath)
        env:
          VITE_BASE: /splatcarve/
        run: pnpm build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
